<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVD — Production Atelier 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0a09;
      --surface: #15120f;
      --surface-2: #1c1916;
      --surface-3: #241f1b;
      --border: #2e2720;
      --border-gold: #3d3226;
      --border-hover: #4a3f33;
      --gold: #c9a96e;
      --gold-light: #dfc08a;
      --gold-dim: #8b7345;
      --gold-subtle: rgba(201,169,110,0.08);
      --gold-glow: rgba(201,169,110,0.15);
      --text: #f5f0e8;
      --text-secondary: #a09080;
      --text-muted: #5c5044;
      --cream: #f5f0e8;
      --need-sample: #e85d5d;
      --ordered-sample: #e8a24c;
      --sample-completed: #5db8d4;
      --ordered-bulk: #5dc98a;
      --in-production: #b07ce8;
      --completed-stage: #5dca6e;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Monogram texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(201,169,110,0.02) 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(201,169,110,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Gold line accent at top */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 100;
    }

    .serif { font-family: 'Playfair Display', Georgia, serif; }

    /* ── Header ── */
    .header {
      padding: 48px 56px 40px;
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--gold);
      padding: 12px 20px;
      border: 1.5px solid var(--gold-dim);
      line-height: 1;
      position: relative;
    }

    .logo::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 0.5px solid var(--gold-dim);
      opacity: 0.4;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-title h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--cream);
    }

    .header-title h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .header-subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border-gold), transparent 80%);
      margin-bottom: 32px;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      gap: 0;
    }

    .stat-card {
      flex: 1;
      padding: 28px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-card:first-child {
      border-radius: 12px 0 0 12px;
    }

    .stat-card:last-child {
      border-radius: 0 12px 12px 0;
    }

    .stat-card:not(:last-child) {
      border-right: none;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-subtle), transparent);
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 400;
      color: var(--cream);
      letter-spacing: -0.5px;
    }

    .stat-value .currency {
      font-size: 22px;
      color: var(--gold);
      margin-right: 2px;
    }

    /* ── Navigation ── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 56px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .view-tabs {
      display: flex;
      gap: 0;
    }

    .view-tab {
      padding: 20px 28px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: all 0.3s ease;
    }

    .view-tab:hover {
      color: var(--text-secondary);
    }

    .view-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── Pipeline ── */
    .pipeline-wrap {
      padding: 24px 56px;
      position: relative;
      z-index: 1;
    }

    .pipeline {
      display: flex;
      gap: 3px;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      background: var(--surface);
    }

    .pipeline-segment {
      height: 100%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 2px;
    }

    .pipeline-segment.need_sample { background: var(--need-sample); }
    .pipeline-segment.ordered_sample { background: var(--ordered-sample); }
    .pipeline-segment.sample_completed { background: var(--sample-completed); }
    .pipeline-segment.ordered_bulk { background: var(--ordered-bulk); }
    .pipeline-segment.in_production { background: var(--in-production); }
    .pipeline-segment.completed { background: var(--completed-stage); }

    /* ── Content ── */
    .content {
      padding: 0 56px 56px;
      position: relative;
      z-index: 1;
    }

    /* ── Stage Chips ── */
    .stage-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stage-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }

    .stage-chip:hover {
      border-color: var(--border-hover);
      background: var(--surface-2);
    }

    .stage-chip.active {
      border-color: var(--gold-dim);
      background: var(--gold-subtle);
    }

    .chip-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .chip-indicator.need_sample { background: var(--need-sample); box-shadow: 0 0 6px var(--need-sample); }
    .chip-indicator.ordered_sample { background: var(--ordered-sample); box-shadow: 0 0 6px var(--ordered-sample); }
    .chip-indicator.sample_completed { background: var(--sample-completed); box-shadow: 0 0 6px var(--sample-completed); }
    .chip-indicator.ordered_bulk { background: var(--ordered-bulk); box-shadow: 0 0 6px var(--ordered-bulk); }
    .chip-indicator.in_production { background: var(--in-production); box-shadow: 0 0 6px var(--in-production); }
    .chip-indicator.completed { background: var(--completed-stage); box-shadow: 0 0 6px var(--completed-stage); }

    .chip-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .chip-count {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--cream);
    }

    /* ── Product Grid (Photo-based) ── */
    .kanban {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ── Product Card ── */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .card-image-area {
      position: relative;
      aspect-ratio: 3 / 4;
      background-size: cover;
      background-position: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-placeholder-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--gold-dim);
      letter-spacing: 8px;
      opacity: 0.3;
    }

    .card-gradient-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
      z-index: 1;
    }

    .card-stage-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }

    .card-stage-badge.need_sample { color: var(--need-sample); border-color: rgba(232,93,93,0.5); }
    .card-stage-badge.ordered_sample { color: var(--ordered-sample); border-color: rgba(232,162,76,0.5); }
    .card-stage-badge.sample_completed { color: var(--sample-completed); border-color: rgba(93,184,212,0.5); }
    .card-stage-badge.ordered_bulk { color: var(--ordered-bulk); border-color: rgba(93,201,138,0.5); }
    .card-stage-badge.in_production { color: var(--in-production); border-color: rgba(176,124,232,0.5); }
    .card-stage-badge.completed { color: var(--completed-stage); border-color: rgba(93,202,110,0.5); }

    .card-stage-badge .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .card-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: var(--cream);
      font-weight: 500;
      z-index: 2;
    }

    .card-info {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-info-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .card-cost {
      font-size: 12px;
      color: var(--gold);
      font-weight: 500;
    }

    .card-units {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Table View ── */
    .table-container {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 16px 24px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold-dim);
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--gold-subtle), transparent);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: var(--surface-2);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 16px 24px;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
    }

    .td-image {
      padding: 10px 24px;
    }

    .image-thumb {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--surface-2);
      flex-shrink: 0;
    }

    .image-thumb-placeholder {
      font-family: 'Playfair Display', serif;
      font-size: 10px;
      color: var(--gold-dim);
      letter-spacing: 2px;
      opacity: 0.2;
    }

    .td-product {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--cream);
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid;
    }

    .stage-badge.need_sample { background: rgba(232,93,93,0.08); color: var(--need-sample); border-color: rgba(232,93,93,0.2); }
    .stage-badge.ordered_sample { background: rgba(232,162,76,0.08); color: var(--ordered-sample); border-color: rgba(232,162,76,0.2); }
    .stage-badge.sample_completed { background: rgba(93,184,212,0.08); color: var(--sample-completed); border-color: rgba(93,184,212,0.2); }
    .stage-badge.ordered_bulk { background: rgba(93,201,138,0.08); color: var(--ordered-bulk); border-color: rgba(93,201,138,0.2); }
    .stage-badge.in_production { background: rgba(176,124,232,0.08); color: var(--in-production); border-color: rgba(176,124,232,0.2); }
    .stage-badge.completed { background: rgba(93,202,110,0.08); color: var(--completed-stage); border-color: rgba(93,202,110,0.2); }

    .stage-badge .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .cost-cell {
      font-variant-numeric: tabular-nums;
      color: var(--gold-light);
      font-weight: 500;
    }

    .units-cell {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .muted {
      color: var(--text-muted);
      font-style: italic;
    }

    .size-text {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
    }

    .loading-text {
      color: var(--gold-dim);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .loading-bar {
      width: 120px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: var(--gold);
      animation: loadSlide 1.2s ease-in-out infinite;
    }

    @keyframes loadSlide {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-gold);
      border-radius: 20px;
      padding: 40px;
      max-width: 540px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(12px) scale(0.98);
      transition: transform 0.3s ease;
      position: relative;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .modal-overlay.show .modal {
      transform: translateY(0) scale(1);
    }

    .modal-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      display: block;
    }

    .modal-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 6px;
    }

    .modal-stage {
      margin-top: 12px;
    }

    .modal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(46,39,32,0.5);
    }

    .modal-row:last-child { border-bottom: none; }

    .modal-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold-dim);
      font-weight: 600;
    }

    .modal-value {
      font-size: 14px;
      color: var(--cream);
      text-align: right;
      max-width: 60%;
    }

    .modal-value.cost {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      font-size: 16px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--cream);
      border-color: var(--gold-dim);
    }

    /* ── Footer ── */
    .footer {
      padding: 40px 56px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .footer-brand {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .footer-live {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--completed-stage);
      animation: livePulse 2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--completed-stage); }
      50% { opacity: 0.4; box-shadow: none; }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header { padding: 28px 24px 24px; }
      .header-top { flex-direction: column; align-items: flex-start; gap: 20px; }
      .stats-row { flex-direction: column; }
      .stat-card { border-radius: 0 !important; border-right: 1px solid var(--border) !important; }
      .stat-card:first-child { border-radius: 12px 12px 0 0 !important; }
      .stat-card:last-child { border-radius: 0 0 12px 12px !important; }
      .nav-bar { padding: 0 24px; }
      .pipeline-wrap { padding: 20px 24px; }
      .content { padding: 0 24px 40px; }
      .kanban { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .stat-value { font-size: 28px; }
      .header-title h1 { font-size: 24px; }
      .footer { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="logo">OVD</div>
        <div class="header-title">
          <h1>Production <em>Atelier</em></h1>
          <div class="header-subtitle">Bulk Collection &mdash; Twenty Twenty-Six</div>
        </div>
      </div>
    </div>

    <div class="header-divider"></div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Pieces</div>
        <div class="stat-value" id="totalProducts">&mdash;</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Units Ordered</div>
        <div class="stat-value" id="totalUnits">&mdash;</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Capital Invested</div>
        <div class="stat-value" id="totalInvested">&mdash;</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completion</div>
        <div class="stat-value" id="completionRate">&mdash;</div>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-bar">
    <div class="view-tabs">
      <div class="view-tab active" data-view="board">Atelier</div>
      <div class="view-tab" data-view="table">Ledger</div>
    </div>
  </div>

  <!-- Pipeline -->
  <div class="pipeline-wrap">
    <div class="pipeline" id="pipeline"></div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <!-- Filters -->
    <div class="stage-filters" id="stageFilters"></div>

    <!-- Board View -->
    <div id="boardView">
      <div class="loading">
        <div class="loading-text">Curating Collection</div>
        <div class="loading-bar"></div>
      </div>
    </div>

    <!-- Table View -->
    <div id="tableView" class="hidden">
      <div class="table-container">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Piece</th>
                <th>Phase</th>
                <th>Unit Cost</th>
                <th>Quantity</th>
                <th>Size Run</th>
                <th>Atelier</th>
                <th>Reference</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-brand">OVD &mdash; Production Management</div>
    <div class="footer-live">
      <div class="live-dot"></div>
      Live Data
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

<script>
  const SUPABASE_URL = 'https://bvftcotmjmoijunnpjdh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2ZnRjb3Rtam1vaWp1bm5wamRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDgyODYsImV4cCI6MjA5MTYyNDI4Nn0.GJJGIjhjkQGF-ROJjHbrL0qrbubonpl5H6guKBzCO6E';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const STAGES = [
    { key: 'need_sample', label: 'Need Sample' },
    { key: 'ordered_sample', label: 'Ordered Sample' },
    { key: 'sample_completed', label: 'Sample Done' },
    { key: 'ordered_bulk', label: 'Ordered Bulk' },
    { key: 'in_production', label: 'In Production' },
    { key: 'completed', label: 'Completed' }
  ];

  let allProducts = [];
  let activeFilter = null;

  async function fetchProducts() {
    const { data, error } = await sb
      .from('products')
      .select('*')
      .order('sort_order', { ascending: true });

    if (error) {
      console.error('Fetch error:', error);
      return;
    }
    allProducts = data || [];
    render();
  }

  function render() {
    const filtered = activeFilter
      ? allProducts.filter(p => p.stage === activeFilter)
      : allProducts;

    renderStats();
    renderPipeline();
    renderFilters();
    renderBoard(filtered);
    renderTable(filtered);
  }

  function renderStats() {
    document.getElementById('totalProducts').textContent = allProducts.length;

    const totalUnits = allProducts.reduce((s, p) => s + (p.units || 0), 0);
    document.getElementById('totalUnits').textContent = totalUnits.toLocaleString();

    const totalCost = allProducts.reduce((s, p) => {
      if (p.cost && p.units) return s + (p.cost * p.units);
      return s;
    }, 0);

    const investedEl = document.getElementById('totalInvested');
    if (totalCost > 0) {
      investedEl.innerHTML = '<span class="currency">$</span>' +
        totalCost.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    } else {
      investedEl.innerHTML = '&mdash;';
    }

    const completed = allProducts.filter(p => p.stage === 'completed').length;
    const pct = allProducts.length > 0 ? Math.round((completed / allProducts.length) * 100) : 0;
    document.getElementById('completionRate').textContent = pct + '%';
  }

  function renderPipeline() {
    const el = document.getElementById('pipeline');
    const total = allProducts.length || 1;
    el.innerHTML = STAGES.map(s => {
      const count = allProducts.filter(p => p.stage === s.key).length;
      const pct = (count / total) * 100;
      return pct > 0
        ? '<div class="pipeline-segment ' + s.key + '" style="width:' + pct + '%" title="' + s.label + ': ' + count + '"></div>'
        : '';
    }).join('');
  }

  function renderFilters() {
    const el = document.getElementById('stageFilters');
    el.innerHTML = STAGES.map(s => {
      const count = allProducts.filter(p => p.stage === s.key).length;
      if (count === 0) return '';
      const isActive = activeFilter === s.key;
      return '<div class="stage-chip ' + (isActive ? 'active' : '') + '" onclick="toggleFilter(\'' + s.key + '\')">' +
        '<div class="chip-indicator ' + s.key + '"></div>' +
        '<span class="chip-name">' + s.label + '</span>' +
        '<span class="chip-count">' + count + '</span>' +
        '</div>';
    }).join('');
  }

  function toggleFilter(stage) {
    activeFilter = activeFilter === stage ? null : stage;
    render();
  }

  function renderBoard(products) {
    const el = document.getElementById('boardView');

    const cards = products.map(p => {
      const bgStyle = p.image_url ? 'background-image: url(' + p.image_url + ')' : '';

      let imageHtml = '';
      if (p.image_url) {
        imageHtml = '<div class="card-image-area" style="' + bgStyle + '">';
      } else {
        imageHtml = '<div class="card-image-area">' +
          '<div class="card-image-placeholder">' +
            '<div class="card-placeholder-text">OVD</div>' +
          '</div>';
      }

      imageHtml += '<div class="card-gradient-overlay"></div>' +
        '<div class="card-stage-badge ' + p.stage + '">' +
          '<span class="badge-dot"></span>' +
          formatStageShort(p.stage) +
        '</div>' +
        '<div class="card-name">' + p.name + '</div>' +
      '</div>';

      const infoHtml = '<div class="card-info">' +
        '<div class="card-info-row">' +
          (p.cost ? '<span class="card-cost">$' + Number(p.cost).toFixed(2) + '</span>' : '') +
          (p.units ? '<span class="card-units">' + p.units + ' pcs</span>' : '') +
        '</div>' +
      '</div>';

      return '<div class="product-card" onclick="showDetail(\'' + p.id + '\')">' +
        imageHtml +
        infoHtml +
      '</div>';
    }).join('');

    el.innerHTML = '<div class="kanban">' + cards + '</div>';
  }

  function formatStageShort(stage) {
    const map = {
      'need_sample': 'Sample Needed',
      'ordered_sample': 'Sample Ordered',
      'sample_completed': 'Sample Done',
      'ordered_bulk': 'Bulk Ordered',
      'in_production': 'In Production',
      'completed': 'Completed'
    };
    return map[stage] || stage;
  }

  function renderTable(products) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = products.map(p => {
      const imageThumbHtml = '<div class="image-thumb" ' +
        (p.image_url ? 'style="background-image: url(' + p.image_url + ')"' : '') +
        (p.image_url ? '' : '><div class="image-thumb-placeholder">OVD</div>') +
        '>' + (p.image_url ? '' : '</div>') + '</div>';

      return '<tr onclick="showDetail(\'' + p.id + '\')" style="cursor:pointer">' +
        '<td class="td-image">' + imageThumbHtml + '</td>' +
        '<td class="td-product">' + p.name + '</td>' +
        '<td><span class="stage-badge ' + p.stage + '"><span class="badge-dot"></span>' + formatStage(p.stage) + '</span></td>' +
        '<td class="cost-cell">' + (p.cost ? '$' + Number(p.cost).toFixed(2) : '<span class="muted">&mdash;</span>') + '</td>' +
        '<td class="units-cell">' + (p.units || '<span class="muted">&mdash;</span>') + '</td>' +
        '<td><div class="size-text">' + (p.size_breakdown || '<span class="muted">&mdash;</span>') + '</div></td>' +
        '<td>' + (p.factory || '<span class="muted">&mdash;</span>') + '</td>' +
        '<td>' + (p.sku || '<span class="muted">&mdash;</span>') + '</td>' +
      '</tr>';
    }).join('');
  }

  function formatStage(stage) {
    return stage.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function showDetail(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;

    const totalCost = (p.cost && p.units) ? '$' + (p.cost * p.units).toLocaleString(undefined, {minimumFractionDigits: 2}) : '&mdash;';

    const rows = [
      ['Unit Cost', p.cost ? '$' + Number(p.cost).toFixed(2) : '&mdash;', 'cost'],
      ['Quantity', p.units || '&mdash;', ''],
      ['Total Investment', totalCost, 'cost'],
      ['Size Run', p.size_breakdown || '&mdash;', ''],
      ['Atelier', p.factory || '&mdash;', ''],
      ['Reference', p.sku || '&mdash;', ''],
      ['Order Date', p.order_date || '&mdash;', ''],
      ['Est. Delivery', p.estimated_delivery || '&mdash;', ''],
      ['Notes', p.notes || '&mdash;', ''],
    ];

    let imageHtml = '';
    if (p.image_url) {
      imageHtml = '<img src="' + p.image_url + '" alt="' + p.name + '" class="modal-image">';
    }

    document.getElementById('modalContent').innerHTML =
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      imageHtml +
      '<div class="modal-header">' +
        '<h2>' + p.name + '</h2>' +
        '<div class="modal-stage"><span class="stage-badge ' + p.stage + '"><span class="badge-dot"></span>' + formatStage(p.stage) + '</span></div>' +
      '</div>' +
      rows.map(function(r) {
        return '<div class="modal-row">' +
          '<span class="modal-label">' + r[0] + '</span>' +
          '<span class="modal-value ' + r[2] + '">' + r[1] + '</span>' +
        '</div>';
      }).join('');

    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // View switching
  document.querySelectorAll('.view-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.view-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      var view = tab.dataset.view;
      document.getElementById('boardView').classList.toggle('hidden', view !== 'board');
      document.getElementById('tableView').classList.toggle('hidden', view !== 'table');
    });
  });

  // Realtime
  sb.channel('products-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, function() {
      fetchProducts();
    })
    .subscribe();

  // Init
  fetchProducts();
</script>

</body>
</html>
